name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: Build and test (PG18)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL 18 dev headers
        run: |
          sudo sh -c 'curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor -o /usr/share/keyrings/postgresql.gpg'
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-18 postgresql-server-dev-18 libssl-dev pkg-config

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-pgrx
        run: OPENSSL_NO_VENDOR=1 cargo install cargo-pgrx --version 0.18.0 --locked

      - name: Initialize pgrx with PG18
        run: cargo pgrx init --pg18 /usr/lib/postgresql/18/bin/pg_config

      - name: Check (clippy)
        working-directory: pg_eddy
        run: cargo clippy --features pg18 -- -D warnings

      - name: Run pgrx tests
        working-directory: pg_eddy
        run: cargo pgrx test pg18

  deny:
    name: Dependency audit (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: Cargo.toml
